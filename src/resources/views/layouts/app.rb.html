<!-- 
  📑 LABEL: LAYOUT UTAMA (app.rb.html)
  Hanya menggunakan HTMX untuk interaksi.
-->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RustBasic{% endblock %}</title>
    
    <!-- 1. Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <!-- 2. File CSS Utama (Injected Local) -->
    <style>{{ app_css() | safe }}</style>
    
    <!-- 3. Library Frontend (HTMX Local Macro) -->
    <script>{{ htmx_js() | safe }}</script>
</head>
<body hx-boost="true" hx-headers='{"X-CSRF-TOKEN": "{{ csrf_token }}"}'>
    <div id="indicator" class="htmx-indicator">Loading...</div>
    
    <main>
        <!-- Flash Messages (Tanpa JS, dirender langsung) -->
        {% if flash_success %}
            <div class="alert alert-success">{{ flash_success }}</div>
        {% endif %}
        {% if flash_error %}
            <div class="alert alert-error">{{ flash_error }}</div>
        {% endif %}

        <!-- Konten dari file lain akan muncul di sini -->
        {% block content %}{% endblock %}
    </main>
</body>
</html>
