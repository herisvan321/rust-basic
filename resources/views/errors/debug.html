<!-- 
  📑 LABEL: HALAMAN DEBUG ERROR (errors/debug.html)
  Halaman kusus saat APP_DEBUG=true untuk melihat detail error.
-->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Error - {{ code }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --error: #f43f5e;
            --accent: #38bdf8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: var(--panel);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border-left: 8px solid var(--error);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .code {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--error);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        .title {
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            word-break: break-word;
        }
        .message {
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent);
        }
        .section {
            background: var(--panel);
            padding: 2rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        td:first-child {
            width: 150px;
            font-weight: 700;
            color: #94a3b8;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="code">Error {{ code }}</div>
            <h1 class="title">{{ title }}</h1>
            <div class="message">
                {{ error_detail }}
            </div>
        </div>

        <div class="section">
            <div class="section-title">Informasi Tambahan</div>
            <table>
                <tr>
                    <td>Template</td>
                    <td>{{ template_name }}</td>
                </tr>
                <tr>
                    <td>Environment</td>
                    <td>{{ env }}</td>
                </tr>
                <tr>
                    <td>Waktu</td>
                    <td>{{ now }}</td>
                </tr>
            </table>
        </div>

        <div class="footer">
            Dihasilkan oleh RustBasic Engine &bull; APP_DEBUG=true
        </div>
    </div>
</body>
</html>
